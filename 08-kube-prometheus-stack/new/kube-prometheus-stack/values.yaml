alertmanager:
  config:
    global:
      resolve_timeout: 3m
  alertmanagerSpec:
    alertmanagerConfigMatcherStrategy:
      type: OnNamespace

kubeControllerManager:
  enabled: false        
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false    

